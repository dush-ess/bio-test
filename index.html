<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест</title>
</head>
<body>
<h1>Тест</h1>
<div id="output"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzFhB7oO9BaEI16so08gTrEIsrbpu78_vzIYKtq8rbPmekNPuDXpwWJdkKWmfy9wv7XZw/exec';

async function run() {
    document.getElementById('output').innerHTML = 'Загрузка...';
    
    try {
        const res = await fetch(API);
        const data = await res.json();
        
        document.getElementById('output').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        
        // Проверяем, что есть olympiads
        if (data.olympiads) {
            console.log('olympiads тип:', Array.isArray(data.olympiads));
            console.log('olympiads длина:', data.olympiads.length);
        } else {
            console.log('olympiads НЕТ в ответе!');
        }
        
    } catch(e) {
        document.getElementById('output').innerHTML = 'Ошибка: ' + e.message;
    }
}

run();
</script>
</body>
</html>
