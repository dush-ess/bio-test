<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🧬 Олимпиадная профориентация</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fff9e6 0%, #ffefc0 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .card {
            background: #fffef7;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            padding: 30px 25px;
            border: 1px solid #ffe6a3;
        }
        h1 { font-size: 28px; color: #c47a00; margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: #b8860b; margin-bottom: 30px; font-size: 16px; }
        .question-text { font-size: 22px; font-weight: 600; color: #5c3d00; margin-bottom: 25px; }
        .answer-btn {
            display: block; width: 100%; text-align: left; background: #fff9ef;
            border: 2px solid #ffdfa5; border-radius: 20px; padding: 16px 20px;
            margin-bottom: 12px; font-size: 16px; color: #5c3d00;
            cursor: pointer; transition: all 0.2s ease;
        }
        .answer-btn:hover { background: #fff0d4; border-color: #e6a700; transform: translateX(5px); }
        .selected { background: #f5b800; border-color: #d49400; color: white; }
        .progress { background: #ffe6b3; border-radius: 20px; height: 10px; margin-bottom: 25px; }
        .progress-bar { background: #f5b800; border-radius: 20px; height: 10px; width: 0%; transition: width 0.3s; }
        .counter { text-align: right; font-size: 14px; color: #b8860b; margin-bottom: 15px; }
        .restart-btn {
            background: #f5b800; color: white; border: none; border-radius: 40px;
            padding: 14px 28px; font-size: 16px; font-weight: bold; cursor: pointer;
            margin-top: 25px; width: 100%;
        }
        .restart-btn:hover { background: #d49400; }
        footer { text-align: center; font-size: 12px; color: #c4a04a; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        td { padding: 8px 0; border-bottom: 1px solid #ffe6b3; }
        .bar-container { background: #ffe6b3; border-radius: 20px; height: 20px; overflow: hidden; width: 100%; }
        .bar { background: #f5b800; height: 20px; border-radius: 20px; width: 0%; }
        h2, h3 { color: #c47a00; }
        .tip { padding: 12px; border-radius: 16px; margin-top: 20px; border-left: 4px solid #f5b800; background: #fff3e0; }
    </style>
</head>
<body>
<div class="container">
    <div class="card" id="app">
        <h1>🧬 Олимпиадная профориентация</h1>
        <div class="subtitle">Узнай, на какую олимпиаду сделать акцент</div>
        <div id="dynamic-content">Загрузка теста...</div>
    </div>
    <footer>Результаты сохраняются для улучшения теста</footer>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyPvVwSlVgJIMovicxNq2GxKNTFTdcO4tdoAvF13VuJBQ_CTDThc3R-2nwKK3R0SKQuRQ/exec';

    let appData = null;
    let currentQuestion = 0;
    let answers = [];

    async function fetchTestData() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            console.log('Данные от API:', data);
            if (data.error) throw new Error(data.error);
            return data;
        } catch (err) {
            console.error(err);
            return null;
        }
    }

    async function sendResults(results, top3) {
        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    results: results,
                    top1: top3[0],
                    top2: top3[1],
                    top3: top3[2]
                })
            });
        } catch (err) {
            console.warn('Не удалось сохранить результат:', err);
        }
    }

    function renderQuestion() {
        const q = appData.questions[currentQuestion];
        const answeredIndex = answers[currentQuestion];
        
        let html = `
            <div class="counter">Вопрос ${currentQuestion+1} из ${appData.questions.length}</div>
            <div class="progress"><div class="progress-bar" style="width: ${((currentQuestion+1)/appData.questions.length)*100}%"></div></div>
            <div class="question-text">${q.text}</div>
        `;
        
        q.answers.forEach((ans, idx) => {
            const answerText = typeof ans === 'object' ? ans.text : ans;
            const isSelected = (answeredIndex === idx);
            html += `<button class="answer-btn ${isSelected ? 'selected' : ''}" data-idx="${idx}">${answerText}</button>`;
        });
        
        html += `<div style="margin-top: 25px; text-align: center; font-size: 14px; color: #b8860b;">Выберите один вариант</div>`;
        
        const container = document.getElementById('dynamic-content');
        container.innerHTML = html;
        
        document.querySelectorAll('.answer-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                selectAnswer(idx);
            });
        });
    }
    
    function selectAnswer(answerIdx) {
        answers[currentQuestion] = answerIdx;
        
        if (currentQuestion + 1 < appData.questions.length) {
            currentQuestion++;
            renderQuestion();
        } else {
            finishTest();
        }
    }
    
    function finishTest() {
        const prettyNames = {
            "Высшая_проба": "Высшая проба",
            "Ломоносов": "Олимпиада «Ломоносов»",
            "Физтех_био": "Физтех Биология",
            "СПБГУ_био": "Олимпиада СПбГУ по биологии",
            "СПБГУ_мед": "Олимпиада СПбГУ по медицине",
            "Сеча_Пир": "Сеченовская и Пироговская олимпиады",
            "Всесибирская": "Всесибирская олимпиада школьников",
            "Мош_генетика": "МОШ по генетике"
        };
        
        const profileScores = {};
        appData.profiles.forEach(p => { profileScores[p] = 0; });
        
        for (let qIdx = 0; qIdx < appData.questions.length; qIdx++) {
            const q = appData.questions[qIdx];
            const answerIdx = answers[qIdx];
            if (answerIdx !== undefined) {
                const answer = q.answers[answerIdx];
                const scores = typeof answer === 'object' && answer.scores ? answer.scores : answer;
                for (let [profile, score] of Object.entries(scores)) {
                    if (typeof score === 'number') {
                        profileScores[profile] += score;
                    }
                }
            }
        }
        
        // Максимально возможные баллы
        const maxPossibleScores = {};
        appData.profiles.forEach(p => { maxPossibleScores[p] = 0; });
        
        for (let qIdx = 0; qIdx < appData.questions.length; qIdx++) {
            const q = appData.questions[qIdx];
            for (let profile of appData.profiles) {
                let maxForThisQuestion = 0;
                for (let answer of q.answers) {
                    const scores = typeof answer === 'object' && answer.scores ? answer.scores : answer;
                    const score = scores[profile] || 0;
                    if (score > maxForThisQuestion) {
                        maxForThisQuestion = score;
                    }
                }
                maxPossibleScores[profile] += maxForThisQuestion;
            }
        }
        
        const resultsArray = Object.entries(profileScores).map(([name, score]) => ({ 
            name: prettyNames[name] || name,
            technicalName: name,
            score: score,
            maxPossible: maxPossibleScores[name]
        }));
        resultsArray.sort((a,b) => b.score - a.score);
        const top3 = resultsArray.slice(0,3);
        
        sendResults(resultsArray, top3);
        
        let resultsHtml = `<h2>📊 Ваши результаты</h2>`;
        resultsHtml += `<h3>🎯 Топ-3 олимпиады</h3>`;
        const medals = ['🥇', '🥈', '🥉'];
        for (let i=0; i<top3.length; i++) {
            resultsHtml += `<p style="font-size: 18px; margin: 8px 0;"><strong>${medals[i]} ${top3[i].name}</strong> — ${top3[i].score} баллов</p>`;
        }
        
        resultsHtml += `<h3>📋 Все олимпиады</h3>`;
        resultsHtml += `<table>`;
        for (let item of resultsArray) {
            const percent = item.maxPossible === 0 ? 0 : Math.round((item.score / item.maxPossible) * 100);
            resultsHtml += `
                <tr>
                    <td style="font-weight: 500;">${item.name}</td>
                    <td>${item.score} / ${item.maxPossible} баллов</td>
                    <td style="width: 40%;"><div class="bar-container"><div class="bar" style="width: ${percent}%;"></div></div></td>
                    <td style="width: 45px;">${percent}%</td>
                </tr>
            `;
        }
        resultsHtml += `</table>`;
        
        // Совет по проценту
        let bestProfile = resultsArray[0];
        for (let item of resultsArray) {
            const itemPercent = item.maxPossible === 0 ? 0 : (item.score / item.maxPossible);
            const bestPercent = bestProfile.maxPossible === 0 ? 0 : (bestProfile.score / bestProfile.maxPossible);
            if (itemPercent > bestPercent) {
                bestProfile = item;
            }
        }
        
        const secondPercent = resultsArray[1].maxPossible === 0 ? 0 : (resultsArray[1].score / resultsArray[1].maxPossible);
        const bestPercent = bestProfile.maxPossible === 0 ? 0 : (bestProfile.score / bestProfile.maxPossible);
        
        if (bestPercent - secondPercent <= 0.1) {
            resultsHtml += `<div class="tip">⚠️ Совет: готовьтесь параллельно к ${bestProfile.name} и ${resultsArray[1].name}</div>`;
        } else {
            resultsHtml += `<div class="tip">✅ Основной акцент на ${bestProfile.name}</div>`;
        }
        
        resultsHtml += `<button class="restart-btn" id="restartBtn">🔄 Пройти тест заново</button>`;
        
        const container = document.getElementById('dynamic-content');
        container.innerHTML = resultsHtml;
        
        document.getElementById('restartBtn')?.addEventListener('click', () => {
            currentQuestion = 0;
            answers = [];
            loadTest();
        });
    }
    
    async function loadTest() {
        document.getElementById('dynamic-content').innerHTML = 'Загрузка вопросов...';
        
        const data = await fetchTestData();
        if (!data || !data.questions) {
            document.getElementById('dynamic-content').innerHTML = 'Ошибка загрузки теста. Попробуйте позже.';
            return;
        }
        
        appData = data;
        currentQuestion = 0;
        answers = new Array(appData.questions.length).fill(undefined);
        renderQuestion();
    }
    
    loadTest();
</script>
</body>
</html>
